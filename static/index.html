<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2332;
    --bg-card-hover: #1f2b3d;
    --border: #2a3548;
    --text-primary: #e2e8f0;
    --text-secondary: #8899aa;
    --text-muted: #556677;
    --critical: #ef4444;
    --critical-bg: rgba(239, 68, 68, 0.08);
    --critical-border: rgba(239, 68, 68, 0.25);
    --warning: #f59e0b;
    --warning-bg: rgba(245, 158, 11, 0.08);
    --warning-border: rgba(245, 158, 11, 0.25);
    --info: #3b82f6;
    --info-bg: rgba(59, 130, 246, 0.08);
    --info-border: rgba(59, 130, 246, 0.25);
    --success: #10b981;
    --success-bg: rgba(16, 185, 129, 0.08);
    --accent: #6366f1;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Noto Sans SC', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 300px;
    background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; position: relative; z-index: 1; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header h1 {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }
  .header h1 span { color: var(--accent); }
  .header-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
  }
  .stat-critical .stat-value { color: var(--critical); }
  .stat-warning .stat-value { color: var(--warning); }
  .stat-info .stat-value { color: var(--info); }
  .stat-total .stat-value { color: var(--text-primary); }

  /* Section Titles */
  .section-title {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* Project Cards */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .project-card:hover { border-color: var(--accent); background: var(--bg-card-hover); }
  .project-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .project-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .project-name {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .project-badges { display: flex; gap: 5px; }
  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .badge-critical { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical-border); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
  .badge-info { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }

  .containers-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .container-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    position: relative;
  }
  .container-dot.running { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
  .container-dot.unhealthy { background: var(--warning); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
  .container-dot.stopped, .container-dot.not_found { background: var(--critical); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  .container-dot.unknown { background: var(--text-muted); }
  .container-dot::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .container-dot:hover::after { opacity: 1; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Event List */
  .events-list { display: flex; flex-direction: column; gap: 6px; }
  .event-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.2s;
    border-left: 3px solid transparent;
  }
  .event-item:hover { border-color: var(--border); }
  .event-item.level-critical { border-left-color: var(--critical); }
  .event-item.level-warning { border-left-color: var(--warning); }
  .event-item.level-info { border-left-color: var(--info); }

  .event-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .event-main { flex: 1; min-width: 0; }
  .event-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .event-level-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .event-level-dot.critical { background: var(--critical); }
  .event-level-dot.warning { background: var(--warning); }
  .event-level-dot.info { background: var(--info); }
  .event-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .event-project {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(99,102,241,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .event-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .event-detail {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    font-family: var(--font-mono);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
  }
  .event-action {
    font-size: 12px;
    color: var(--success);
    margin-top: 6px;
    font-family: var(--font-mono);
  }
  .event-action::before { content: '→ '; }

  .event-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; }
  .action-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .action-btn.resolve-btn:hover { border-color: var(--success); color: var(--success); }

  .event-status-resolved { opacity: 0.45; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  @media (max-width: 640px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .projects-grid { grid-template-columns: 1fr; }
    .event-top { flex-direction: column; }
    .event-actions { align-self: flex-end; }
  }
</style>
</head>
<body>
<div class="app" x-data="dashboard()" x-init="init()">

  <div class="header">
    <h1><span>&gt;</span> ops-dashboard</h1>
    <div class="header-meta" x-text="lastRefresh ? 'updated ' + timeAgo(lastRefresh) : 'loading...'"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card stat-critical">
      <div class="stat-label">Critical</div>
      <div class="stat-value" x-text="stats.critical || 0"></div>
    </div>
    <div class="stat-card stat-warning">
      <div class="stat-label">Warning</div>
      <div class="stat-value" x-text="stats.warning || 0"></div>
    </div>
    <div class="stat-card stat-info">
      <div class="stat-label">Info</div>
      <div class="stat-value" x-text="stats.info || 0"></div>
    </div>
    <div class="stat-card stat-total">
      <div class="stat-label">Total Open</div>
      <div class="stat-value" x-text="stats.total_open || 0"></div>
    </div>
  </div>

  <!-- Projects -->
  <div class="section-title">Projects</div>
  <div class="projects-grid">
    <template x-for="p in projects" :key="p.project">
      <div class="project-card"
           :class="{'selected': filterProject === p.project}"
           @click="filterProject = filterProject === p.project ? null : p.project; fetchEvents()">
        <div class="project-header">
          <div class="project-name" x-text="p.project"></div>
          <div class="project-badges">
            <span class="badge badge-critical" x-show="p.critical_count > 0" x-text="p.critical_count"></span>
            <span class="badge badge-warning" x-show="p.warning_count > 0" x-text="p.warning_count"></span>
            <span class="badge badge-info" x-show="p.info_count > 0" x-text="p.info_count"></span>
          </div>
        </div>
        <div class="containers-row">
          <template x-for="c in p.containers" :key="c.name">
            <div class="container-dot"
                 :class="c.health === 'unhealthy' ? 'unhealthy' : c.status"
                 :data-tip="c.name + ' (' + c.status + (c.health !== 'N/A' ? '/' + c.health : '') + ')'">
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Events -->
  <div class="section-title">Events</div>

  <div class="filters">
    <button class="filter-btn" :class="{'active': !filterLevel}" @click="filterLevel = null; fetchEvents()">All</button>
    <button class="filter-btn" :class="{'active': filterLevel === 'critical'}" @click="filterLevel = 'critical'; fetchEvents()">Critical</button>
    <button class="filter-btn" :class="{'active': filterLevel === 'warning'}" @click="filterLevel = 'warning'; fetchEvents()">Warning</button>
    <button class="filter-btn" :class="{'active': filterLevel === 'info'}" @click="filterLevel = 'info'; fetchEvents()">Info</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="filter-btn" :class="{'active': filterStatus === 'open'}" @click="filterStatus = filterStatus === 'open' ? null : 'open'; fetchEvents()">Open</button>
    <button class="filter-btn" :class="{'active': filterStatus === 'resolved'}" @click="filterStatus = filterStatus === 'resolved' ? null : 'resolved'; fetchEvents()">Resolved</button>
  </div>

  <div class="events-list" x-show="events.length > 0">
    <template x-for="e in events" :key="e.id">
      <div class="event-item" :class="'level-' + e.level + (e.status === 'resolved' ? ' event-status-resolved' : '')">
        <div class="event-top">
          <div class="event-main">
            <div class="event-title-row">
              <div class="event-level-dot" :class="e.level"></div>
              <span class="event-project" x-text="e.project"></span>
              <span class="event-title" x-text="e.title"></span>
            </div>
            <div class="event-meta">
              <span x-text="e.category"></span> &middot;
              <span x-text="timeAgo(e.created_at)"></span>
              <span x-show="e.status !== 'open'" x-text="' &middot; ' + e.status"></span>
            </div>
            <div class="event-detail" x-show="e.detail" x-text="e.detail"></div>
            <div class="event-action" x-show="e.action_hint" x-text="e.action_hint"></div>
          </div>
          <div class="event-actions" x-show="e.status !== 'resolved'">
            <button class="action-btn" x-show="e.status === 'open'" @click="updateStatus(e.id, 'acknowledged')">ACK</button>
            <button class="action-btn resolve-btn" @click="updateStatus(e.id, 'resolved')">RESOLVE</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <div class="empty-state" x-show="events.length === 0 && !loading">
    <div class="empty-icon">✓</div>
    <div>No events matching filters</div>
  </div>

  <div class="loading" x-show="loading">loading...</div>

</div>

<script>
function dashboard() {
  return {
    stats: {},
    projects: [],
    events: [],
    loading: true,
    lastRefresh: null,
    filterProject: null,
    filterLevel: null,
    filterStatus: 'open',
    refreshTimer: null,

    async init() {
      await this.refresh();
      this.refreshTimer = setInterval(() => this.refresh(), 30000);
    },

    async refresh() {
      await Promise.all([this.fetchStats(), this.fetchProjects(), this.fetchEvents()]);
      this.lastRefresh = new Date().toISOString();
      this.loading = false;
    },

    async fetchStats() {
      try {
        const r = await fetch('/api/stats');
        this.stats = await r.json();
      } catch (e) { console.error('stats error', e); }
    },

    async fetchProjects() {
      try {
        const r = await fetch('/api/projects');
        this.projects = await r.json();
      } catch (e) { console.error('projects error', e); }
    },

    async fetchEvents() {
      try {
        const params = new URLSearchParams();
        if (this.filterProject) params.set('project', this.filterProject);
        if (this.filterLevel) params.set('level', this.filterLevel);
        if (this.filterStatus) params.set('status', this.filterStatus);
        const r = await fetch('/api/events?' + params.toString());
        this.events = await r.json();
      } catch (e) { console.error('events error', e); }
    },

    async updateStatus(id, status) {
      try {
        await fetch(`/api/events/${id}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status}),
        });
        await this.refresh();
      } catch (e) { console.error('update error', e); }
    },

    timeAgo(iso) {
      if (!iso) return '';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    },
  };
}
</script>
</body>
</html>
