<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2332;
    --bg-card-hover: #1f2b3d;
    --border: #2a3548;
    --text-primary: #e2e8f0;
    --text-secondary: #8899aa;
    --text-muted: #556677;
    --critical: #ef4444;
    --critical-bg: rgba(239, 68, 68, 0.08);
    --critical-border: rgba(239, 68, 68, 0.25);
    --warning: #f59e0b;
    --warning-bg: rgba(245, 158, 11, 0.08);
    --warning-border: rgba(245, 158, 11, 0.25);
    --info: #3b82f6;
    --info-bg: rgba(59, 130, 246, 0.08);
    --info-border: rgba(59, 130, 246, 0.25);
    --success: #10b981;
    --success-bg: rgba(16, 185, 129, 0.08);
    --accent: #6366f1;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Noto Sans SC', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 300px;
    background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; position: relative; z-index: 1; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header h1 {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }
  .header h1 span { color: var(--accent); }
  .header-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
  }
  .stat-critical .stat-value { color: var(--critical); }
  .stat-warning .stat-value { color: var(--warning); }
  .stat-info .stat-value { color: var(--info); }
  .stat-total .stat-value { color: var(--text-primary); }

  /* Section Titles */
  .section-title {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* Project Cards */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .project-card:hover { border-color: var(--accent); background: var(--bg-card-hover); }
  .project-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .project-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .project-name {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .project-badges { display: flex; gap: 5px; }
  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .badge-critical { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical-border); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
  .badge-info { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }

  .containers-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .container-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    position: relative;
  }
  .container-dot.running { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
  .container-dot.unhealthy { background: var(--warning); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
  .container-dot.stopped, .container-dot.not_found { background: var(--critical); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  .container-dot.unknown { background: var(--text-muted); }
  .container-dot::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .container-dot:hover::after { opacity: 1; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Event List */
  .events-list { display: flex; flex-direction: column; gap: 6px; }
  .event-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.2s;
    border-left: 3px solid transparent;
  }
  .event-item:hover { border-color: var(--border); }
  .event-item.level-critical { border-left-color: var(--critical); }
  .event-item.level-warning { border-left-color: var(--warning); }
  .event-item.level-info { border-left-color: var(--info); }

  .event-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .event-main { flex: 1; min-width: 0; }
  .event-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .event-level-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .event-level-dot.critical { background: var(--critical); }
  .event-level-dot.warning { background: var(--warning); }
  .event-level-dot.info { background: var(--info); }
  .event-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .event-project {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(99,102,241,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .event-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .event-detail {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    font-family: var(--font-mono);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
  }
  .event-action {
    font-size: 12px;
    color: var(--success);
    margin-top: 6px;
    font-family: var(--font-mono);
  }
  .event-action::before { content: '→ '; }

  .event-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; }
  .action-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .action-btn.resolve-btn:hover { border-color: var(--success); color: var(--success); }

  .event-status-resolved { opacity: 0.45; }

  /* GEP Repair Stats */
  .repair-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .repair-bar-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .repair-bar-title .dna { font-size: 14px; }
  .repair-metric {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }
  .repair-metric-value {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .repair-metric-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .repair-metric-value.rate-good { color: var(--success); }
  .repair-metric-value.rate-mid { color: var(--warning); }
  .repair-metric-value.rate-bad { color: var(--critical); }
  .repair-gene-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid rgba(16, 185, 129, 0.25);
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* Settings Panel */
  .settings-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .settings-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: min(680px, 95vw);
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
    z-index: 1;
    border-radius: 12px 12px 0 0;
  }
  .settings-header h2 {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .settings-close {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  .settings-close:hover { border-color: var(--critical); color: var(--critical); }
  .settings-body { padding: 20px 24px 24px; }
  .settings-group {
    margin-bottom: 24px;
  }
  .settings-group-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .config-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .config-item:hover { border-color: rgba(99,102,241,0.3); }
  .config-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }
  .config-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .config-source {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .config-source.src-db { background: rgba(16,185,129,0.12); color: var(--success); border: 1px solid rgba(16,185,129,0.25); }
  .config-source.src-env { background: rgba(59,130,246,0.12); color: var(--info); border: 1px solid rgba(59,130,246,0.25); }
  .config-source.src-default { background: rgba(85,102,119,0.15); color: var(--text-muted); border: 1px solid rgba(85,102,119,0.25); }
  .config-source.src-none { background: rgba(239,68,68,0.08); color: var(--text-muted); border: 1px solid rgba(239,68,68,0.15); }
  .config-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .config-input-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .config-input {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .config-input:focus { border-color: var(--accent); }
  .config-input::placeholder { color: var(--text-muted); }
  .config-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .config-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .config-btn.save-btn { border-color: var(--success); color: var(--success); }
  .config-btn.save-btn:hover { background: rgba(16,185,129,0.1); }
  .config-btn.reset-btn:hover { border-color: var(--warning); color: var(--warning); }
  .config-btn.test-btn { border-color: var(--accent); color: var(--accent); }
  .config-btn.test-btn:hover { background: rgba(99,102,241,0.1); }
  .config-key {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .settings-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    z-index: 200;
    animation: toastIn 0.3s ease;
    max-width: 360px;
  }
  .toast-success { background: var(--success); color: #fff; }
  .toast-error { background: var(--critical); color: #fff; }
  .toast-info { background: var(--accent); color: #fff; }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Settings Gear Button */
  .settings-btn {
    width: 34px; height: 34px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .settings-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(30deg); }

  @media (max-width: 640px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .projects-grid { grid-template-columns: 1fr; }
    .event-top { flex-direction: column; }
    .event-actions { align-self: flex-end; }
    .settings-panel { width: 100vw; max-height: 100vh; border-radius: 0; }
  }
</style>
</head>
<body>
<div class="app" x-data="dashboard()" x-init="init()">

  <div class="header">
    <h1><span>&gt;</span> ops-dashboard</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="header-meta" x-text="lastRefresh ? 'updated ' + timeAgo(lastRefresh) : 'loading...'"></div>
      <button class="settings-btn" @click="openSettings()" title="设置">&#9881;</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card stat-critical">
      <div class="stat-label">Critical</div>
      <div class="stat-value" x-text="stats.critical || 0"></div>
    </div>
    <div class="stat-card stat-warning">
      <div class="stat-label">Warning</div>
      <div class="stat-value" x-text="stats.warning || 0"></div>
    </div>
    <div class="stat-card stat-info">
      <div class="stat-label">Info</div>
      <div class="stat-value" x-text="stats.info || 0"></div>
    </div>
    <div class="stat-card stat-total">
      <div class="stat-label">Total Open</div>
      <div class="stat-value" x-text="stats.total_open || 0"></div>
    </div>
  </div>

  <!-- GEP Repair Stats -->
  <div class="repair-bar" x-show="stats.repair && stats.repair.total_attempts > 0">
    <div class="repair-bar-title">
      <span class="dna">&#129516;</span> GEP Auto-Repair
    </div>
    <div class="repair-metric">
      <span class="repair-metric-value" x-text="stats.repair?.total_attempts || 0"></span>
      <span class="repair-metric-label">attempts</span>
    </div>
    <div class="repair-metric">
      <span class="repair-metric-value"
            :class="(stats.repair?.success_rate || 0) >= 0.7 ? 'rate-good' : (stats.repair?.success_rate || 0) >= 0.4 ? 'rate-mid' : 'rate-bad'"
            x-text="((stats.repair?.success_rate || 0) * 100).toFixed(0) + '%'"></span>
      <span class="repair-metric-label">success rate</span>
    </div>
    <div class="repair-metric">
      <span class="repair-metric-value" x-text="stats.repair?.total_success || 0"></span>
      <span class="repair-metric-label">fixed</span>
    </div>
    <div class="repair-metric">
      <span class="repair-metric-value" x-text="Object.keys(stats.repair?.genes || {}).length"></span>
      <span class="repair-metric-label">genes active</span>
    </div>
  </div>

  <!-- Projects -->
  <div class="section-title">Projects</div>
  <div class="projects-grid">
    <template x-for="p in projects" :key="p.project">
      <div class="project-card"
           :class="{'selected': filterProject === p.project}"
           @click="filterProject = filterProject === p.project ? null : p.project; fetchEvents()">
        <div class="project-header">
          <div class="project-name" x-text="p.project"></div>
          <div class="project-badges">
            <span class="badge badge-critical" x-show="p.critical_count > 0" x-text="p.critical_count"></span>
            <span class="badge badge-warning" x-show="p.warning_count > 0" x-text="p.warning_count"></span>
            <span class="badge badge-info" x-show="p.info_count > 0" x-text="p.info_count"></span>
          </div>
        </div>
        <div class="containers-row">
          <template x-for="c in p.containers" :key="c.name">
            <div class="container-dot"
                 :class="c.health === 'unhealthy' ? 'unhealthy' : c.status"
                 :data-tip="c.name + ' (' + c.status + (c.health !== 'N/A' ? '/' + c.health : '') + ')'">
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Events -->
  <div class="section-title">Events</div>

  <div class="filters">
    <button class="filter-btn" :class="{'active': !filterLevel}" @click="filterLevel = null; fetchEvents()">All</button>
    <button class="filter-btn" :class="{'active': filterLevel === 'critical'}" @click="filterLevel = 'critical'; fetchEvents()">Critical</button>
    <button class="filter-btn" :class="{'active': filterLevel === 'warning'}" @click="filterLevel = 'warning'; fetchEvents()">Warning</button>
    <button class="filter-btn" :class="{'active': filterLevel === 'info'}" @click="filterLevel = 'info'; fetchEvents()">Info</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="filter-btn" :class="{'active': filterStatus === 'open'}" @click="filterStatus = filterStatus === 'open' ? null : 'open'; fetchEvents()">Open</button>
    <button class="filter-btn" :class="{'active': filterStatus === 'resolved'}" @click="filterStatus = filterStatus === 'resolved' ? null : 'resolved'; fetchEvents()">Resolved</button>
  </div>

  <div class="events-list" x-show="events.length > 0">
    <template x-for="e in events" :key="e.id">
      <div class="event-item" :class="'level-' + e.level + (e.status === 'resolved' ? ' event-status-resolved' : '')">
        <div class="event-top">
          <div class="event-main">
            <div class="event-title-row">
              <div class="event-level-dot" :class="e.level"></div>
              <span class="event-project" x-text="e.project"></span>
              <span class="event-title" x-text="e.title"></span>
            </div>
            <div class="event-meta">
              <span x-text="e.category"></span> &middot;
              <span x-text="timeAgo(e.created_at)"></span>
              <span x-show="e.status !== 'open'" x-text="' &middot; ' + e.status"></span>
            </div>
            <div class="event-detail" x-show="e.detail" x-text="e.detail"></div>
            <div class="event-action" x-show="e.action_hint" x-text="e.action_hint"></div>
          </div>
          <div class="event-actions" x-show="e.status !== 'resolved'">
            <button class="action-btn" x-show="e.status === 'open'" @click="updateStatus(e.id, 'acknowledged')">ACK</button>
            <button class="action-btn resolve-btn" @click="updateStatus(e.id, 'resolved')">RESOLVE</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <div class="empty-state" x-show="events.length === 0 && !loading">
    <div class="empty-icon">✓</div>
    <div>No events matching filters</div>
  </div>

  <div class="loading" x-show="loading">loading...</div>

  <!-- Settings Panel -->
  <div class="settings-overlay" x-show="showSettings" x-cloak @click.self="showSettings = false"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       style="display:none">
    <div class="settings-panel" @click.stop>
      <div class="settings-header">
        <h2>&#9881; 运行配置</h2>
        <button class="settings-close" @click="showSettings = false">&times;</button>
      </div>
      <div class="settings-body">
        <template x-for="group in configGroups" :key="group.key">
          <div class="settings-group">
            <div class="settings-group-title" x-text="group.label"></div>
            <template x-for="item in configsByGroup(group.key)" :key="item.key">
              <div class="config-item">
                <div class="config-item-header">
                  <div>
                    <div class="config-label" x-text="item.label"></div>
                    <div class="config-key" x-text="item.key"></div>
                  </div>
                  <span class="config-source"
                        :class="'src-' + item.source"
                        x-text="item.source === 'db' ? 'DB' : item.source === 'env' ? 'ENV' : item.source === 'default' ? 'DEFAULT' : 'UNSET'">
                  </span>
                </div>
                <div class="config-desc" x-text="item.description"></div>
                <div class="config-input-row">
                  <input class="config-input"
                         :type="item.is_secret ? 'password' : 'text'"
                         :value="configEdits[item.key] !== undefined ? configEdits[item.key] : item.value"
                         @input="configEdits[item.key] = $event.target.value"
                         :placeholder="item.is_secret ? '••••••••' : '未设置'"
                  />
                  <button class="config-btn save-btn"
                          @click="saveConfig(item.key)"
                          :disabled="configEdits[item.key] === undefined">
                    保存
                  </button>
                  <button class="config-btn reset-btn"
                          x-show="item.source === 'db'"
                          @click="resetConfig(item.key)">
                    重置
                  </button>
                </div>
              </div>
            </template>
          </div>
        </template>

        <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
          <button class="config-btn test-btn" @click="testNotify()" :disabled="testingNotify">
            <span x-text="testingNotify ? '发送中...' : '🧪 测试推送'"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div x-show="toast.show" x-cloak
       class="toast"
       :class="'toast-' + toast.type"
       x-text="toast.message"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       style="display:none">
  </div>

</div>

<script>
function dashboard() {
  return {
    stats: {},
    projects: [],
    events: [],
    loading: true,
    lastRefresh: null,
    filterProject: null,
    filterLevel: null,
    filterStatus: 'open',
    refreshTimer: null,

    showSettings: false,
    configs: [],
    configEdits: {},
    testingNotify: false,
    toast: { show: false, message: '', type: 'success' },

    configGroups: [
      { key: 'notification', label: '📢 通知推送' },
      { key: 'escalation', label: '⏰ 升级告警' },
      { key: 'probe', label: '🔍 探测设置' },
    ],

    async init() {
      await this.refresh();
      this.refreshTimer = setInterval(() => this.refresh(), 30000);
    },

    async refresh() {
      await Promise.all([this.fetchStats(), this.fetchProjects(), this.fetchEvents()]);
      this.lastRefresh = new Date().toISOString();
      this.loading = false;
    },

    async fetchStats() {
      try {
        const r = await fetch('/api/stats');
        this.stats = await r.json();
      } catch (e) { console.error('stats error', e); }
    },

    async fetchProjects() {
      try {
        const r = await fetch('/api/projects');
        this.projects = await r.json();
      } catch (e) { console.error('projects error', e); }
    },

    async fetchEvents() {
      try {
        const params = new URLSearchParams();
        if (this.filterProject) params.set('project', this.filterProject);
        if (this.filterLevel) params.set('level', this.filterLevel);
        if (this.filterStatus) params.set('status', this.filterStatus);
        const r = await fetch('/api/events?' + params.toString());
        this.events = await r.json();
      } catch (e) { console.error('events error', e); }
    },

    async updateStatus(id, status) {
      try {
        await fetch(`/api/events/${id}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status}),
        });
        await this.refresh();
      } catch (e) { console.error('update error', e); }
    },

    async openSettings() {
      this.showSettings = true;
      this.configEdits = {};
      await this.fetchConfigs();
    },

    async fetchConfigs() {
      try {
        const r = await fetch('/api/config');
        this.configs = await r.json();
      } catch (e) {
        console.error('config fetch error', e);
        this.showToast('加载配置失败', 'error');
      }
    },

    configsByGroup(groupKey) {
      return this.configs.filter(c => c.group === groupKey);
    },

    async saveConfig(key) {
      const value = this.configEdits[key];
      if (value === undefined) return;
      try {
        const r = await fetch(`/api/config/${key}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value }),
        });
        if (r.ok) {
          this.showToast(`${key} 已保存，立即生效`, 'success');
          delete this.configEdits[key];
          await this.fetchConfigs();
        } else {
          const err = await r.json();
          this.showToast(err.detail || '保存失败', 'error');
        }
      } catch (e) {
        this.showToast('保存失败: ' + e.message, 'error');
      }
    },

    async resetConfig(key) {
      try {
        const r = await fetch(`/api/config/${key}`, { method: 'DELETE' });
        if (r.ok) {
          this.showToast(`${key} 已重置为 ENV 兜底值`, 'info');
          delete this.configEdits[key];
          await this.fetchConfigs();
        }
      } catch (e) {
        this.showToast('重置失败: ' + e.message, 'error');
      }
    },

    async testNotify() {
      this.testingNotify = true;
      try {
        const r = await fetch('/api/config/test-notify', { method: 'POST' });
        const result = await r.json();
        const feishu = result.feishu;
        const wework = result.wework;

        if (feishu === true || wework === true) {
          const channels = [];
          if (feishu === true) channels.push('飞书');
          if (wework === true) channels.push('企微');
          this.showToast(`测试推送成功 → ${channels.join(', ')}`, 'success');
        } else if (feishu === null && wework === null) {
          this.showToast('未配置任何 Webhook 地址', 'error');
        } else {
          this.showToast('推送失败，请检查 Webhook 地址', 'error');
        }
      } catch (e) {
        this.showToast('测试推送失败: ' + e.message, 'error');
      }
      this.testingNotify = false;
    },

    showToast(message, type = 'success') {
      this.toast = { show: true, message, type };
      setTimeout(() => { this.toast.show = false; }, 3000);
    },

    timeAgo(iso) {
      if (!iso) return '';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    },
  };
}
</script>
</body>
</html>
